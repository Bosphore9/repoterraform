# .github/workflows/terraform.yml
name: Terraform CI/CD

on:
  pull_request:
    branches: [main, dev]
    paths:
      - '**.tf'
      - '**.tfvars'
      - '.github/workflows/terraform.yml'
  push:
    branches: [main, dev]
    paths:
      - '**.tf'
      - '**.tfvars'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: 1.14.0
  TF_WORKING_DIR: .
  GOOGLE_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
  TF_IN_AUTOMATION: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

  fmt:
    name: Fmt
    runs-on: ubuntu-latest
    needs: validate

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Fmt Check
        run: terraform fmt -check -recursive

  workspace:
    name: Workspace
    runs-on: ubuntu-latest
    needs: fmt

    outputs:
      workspace_name: ${{ steps.set_workspace.outputs.workspace_name }}

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Resolve workspace
        id: set_workspace
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "workspace_name=prod" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_NAME}" == "dev" ]]; then
            echo "workspace_name=dev" >> "$GITHUB_OUTPUT"
          else
            SAFE_NAME=$(echo "${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}" | tr '/' '-' | tr '_' '-')
            echo "workspace_name=${SAFE_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or select workspace
        shell: bash
        run: |
          terraform workspace select "${{ steps.set_workspace.outputs.workspace_name }}" \
          || terraform workspace new "${{ steps.set_workspace.outputs.workspace_name }}"

      - name: Show current workspace
        run: terraform workspace show

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: workspace

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    outputs:
      tfplan_name: ${{ steps.planmeta.outputs.tfplan_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Select workspace
        run: terraform workspace select "${{ needs.workspace.outputs.workspace_name }}"

      - name: Generate plan filename
        id: planmeta
        shell: bash
        run: |
          echo "tfplan_name=tfplan-${{ needs.workspace.outputs.workspace_name }}" >> "$GITHUB_OUTPUT"

      - name: Terraform Plan
        run: |
          terraform plan \
            -input=false \
            -out="${{ steps.planmeta.outputs.tfplan_name }}"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.planmeta.outputs.tfplan_name }}
          path: ${{ env.TF_WORKING_DIR }}/${{ steps.planmeta.outputs.tfplan_name }}

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: [workspace, plan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Select workspace
        run: terraform workspace select "${{ needs.workspace.outputs.workspace_name }}"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.plan.outputs.tfplan_name }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve "${{ needs.plan.outputs.tfplan_name }}"
