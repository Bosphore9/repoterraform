name: Terraform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TF_VERSION: '1.7.0'
  TF_DIR: './infrastructure'
  GOOGLE_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

jobs:
  terraform:
    name: 'Terraform — ${{ matrix.workspace }}'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [dev, staging, prod]
      fail-fast: false
    environment: ${{ matrix.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: fmt
        run: terraform fmt -check -recursive
        working-directory: ${{ env.TF_DIR }}

      - name: init
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" -backend-config="prefix=terraform/${{ matrix.workspace }}"
        working-directory: ${{ env.TF_DIR }}

      - name: workspace
        run: terraform workspace select ${{ matrix.workspace }} || terraform workspace new ${{ matrix.workspace }}
        working-directory: ${{ env.TF_DIR }}

      - name: validate
        run: terraform validate -no-color
        working-directory: ${{ env.TF_DIR }}

      - name: plan
        run: terraform plan -var-file="environments/${{ matrix.workspace }}.tfvars" -out=tfplan -no-color -input=false
        working-directory: ${{ env.TF_DIR }}

      - name: apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false tfplan
        working-directory: ${{ env.TF_DIR }}
